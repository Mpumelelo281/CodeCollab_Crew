{% extends "base.html" %}

{% block title %}Bad Request - CodeCollab Crew{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="mb-4">
                <i class="bi bi-exclamation-circle display-1 text-warning"></i>
            </div>
            <h1 class="display-4">400</h1>
            <h2 class="mb-4">Bad Request</h2>
            <p class="lead text-muted mb-4">
                The request could not be understood by the server. Please check your input and try again.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">
                    <i class="bi bi-house me-2"></i>Go Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Go Back
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
